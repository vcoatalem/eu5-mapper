name: Run tests

on:
  # Runs on pushes targeting the default branch
  push:
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Detect package manager
        id: detect-package-manager
        run: |
          if [ -f "${{ github.workspace }}/yarn.lock" ]; then
            echo "manager=yarn" >> $GITHUB_OUTPUT
            echo "command=install" >> $GITHUB_OUTPUT
            echo "runner=yarn" >> $GITHUB_OUTPUT
            exit 0
          elif [ -f "${{ github.workspace }}/package.json" ]; then
            echo "manager=npm" >> $GITHUB_OUTPUT
            echo "command=ci" >> $GITHUB_OUTPUT
            echo "runner=npx --no-install" >> $GITHUB_OUTPUT
            exit 0
          else
            echo "Unable to determine package manager"
            exit 1
          fi
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: ${{ steps.detect-package-manager.outputs.manager }}
      - name: Install dependencies
        run: ${{ steps.detect-package-manager.outputs.manager }} ${{ steps.detect-package-manager.outputs.command }}
      - name: Run tests
        run: ${{ steps.detect-package-manager.outputs.runner }} npm run test
      - name: Configure AWS credentials
        if: always()
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
      - name: Export results to S3
        if: always()
        run: |
          COMMIT_SHA="${{ github.sha }}"
          S3_BUCKET="eu5-mapapp"
          S3_PREFIX="test-results/${COMMIT_SHA}"
          
          # Upload all HTML files from tests/pathfinding/output
          if [ -d "tests/pathfinding/output" ]; then
            aws s3 sync tests/pathfinding/output s3://${S3_BUCKET}/${S3_PREFIX}/ --exclude "*" --include "*.html" --include "*.json" --delete
            echo "✅ Uploaded test results to s3://${S3_BUCKET}/${S3_PREFIX}/"
          else
            echo "⚠️ No test results directory found"
          fi